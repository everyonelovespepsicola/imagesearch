<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <style>
    .google-font {
      font-family: 'Product Sans', 'Google Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 50px;
      font-weight: 500;
      letter-spacing: -1px;
    }
  </style>
  <!-- scale(1, -1) creates a vertical puddle reflection (upside down, but reads left-to-right)! -->
  <g transform="translate(0, 60) scale(1, -1)">
    <text x="100" y="46" text-anchor="middle" class="google-font">
      <tspan fill="#4285f4">G</tspan><tspan fill="#ea4335">o</tspan><tspan fill="#fbbc05">o</tspan><tspan fill="#4285f4">g</tspan><tspan fill="#34a853">l</tspan><tspan fill="#ea4335">e</tspan>
    </text>
  </g>
</svg>